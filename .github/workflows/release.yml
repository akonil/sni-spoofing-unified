name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v${{ steps.version.outputs.version }}-${SHORT_SHA}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/sni-spoof dist/sni-spoof-linux-x64
          cp config.json dist/
          cp README.md dist/
          cp LICENSE dist/
          tar czf sni-spoof-linux-x64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: sni-spoof-linux-x64.tar.gz

  build-macos-x64:
    needs: create-release
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libpcap

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/sni-spoof dist/sni-spoof-macos-x64
          cp config.json dist/
          cp README.md dist/
          cp LICENSE dist/
          tar czf sni-spoof-macos-x64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: sni-spoof-macos-x64.tar.gz

  build-macos-arm:
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libpcap

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/sni-spoof dist/sni-spoof-macos-arm64
          cp config.json dist/
          cp README.md dist/
          cp LICENSE dist/
          tar czf sni-spoof-macos-arm64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: sni-spoof-macos-arm64.tar.gz

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package binary
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\sni-spoof.exe dist\sni-spoof-windows-x64.exe
          Copy-Item config.json dist\
          Copy-Item README.md dist\
          Copy-Item LICENSE dist\
          Compress-Archive -Path dist\* -DestinationPath sni-spoof-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: sni-spoof-windows-x64.zip

  publish-release:
    needs: [create-release, build-linux, build-macos-x64, build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          name: Release ${{ needs.create-release.outputs.tag }}
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            Automated release for commit ${{ github.sha }}

            ## Binaries
            - `sni-spoof-linux-x64.tar.gz` - Linux (x86_64)
            - `sni-spoof-macos-x64.tar.gz` - macOS Intel (x86_64)
            - `sni-spoof-macos-arm64.tar.gz` - macOS Apple Silicon (ARM64)
            - `sni-spoof-windows-x64.zip` - Windows (x86_64)
